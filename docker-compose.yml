services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: wordle-duel-backend
    environment:
      PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: wordle-duel-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
